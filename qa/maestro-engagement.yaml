appId: com.resolutioncompanion.app
---
# Remaining engagement items: micro-note expand (asserted via the card's
# Expand→Collapse label change), live weekly-review coach session, and the
# Dawn switch flipped back to midnight through the UI.

- launchApp

# Seeded history completes a milestone on launch, firing the completion
# celebration (with the Dawn-theme unlock reveal). Dismiss it to reach Today.
# Optional + repeated so the flow is robust whether one or several fire, or
# none (already seen on a prior launch).
- repeat:
    times: 3
    commands:
      - tapOn:
          text: "Dismiss milestone celebration.*"
          optional: true
      - waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Momentum Builder.*"
    timeout: 20000
- tapOn: "Coach, tab.*"
- waitForAnimationToEnd

# --- Micro-note: expand, verified by the accessibility state flip ---
- scrollUntilVisible:
    element:
      text: "60-second read.*"
    direction: DOWN
    timeout: 30000
    centerElement: true
- tapOn: "60-second read.*"
- waitForAnimationToEnd
- assertVisible: "60-second read.*Collapse.*"
- takeScreenshot: 16-micro-note-expanded
- scrollUntilVisible:
    element:
      text: ".*3-minute weekly review.*"
    direction: UP
    timeout: 30000
    centerElement: true

# --- Live weekly review: consent-agree + real coach reply ---
- tapOn: ".*3-minute weekly review.*"
- tapOn:
    text: "Agree and continue.*"
    optional: true
- extendedWaitUntil:
    visible: "Message to your AI coach.*"
    timeout: 45000
- extendedWaitUntil:
    # Match a non-empty coach bubble. The old week regex matched the static
    # "Weekly Review" title while the response was still spinning.
    visible: "AI coach: .+"
    timeout: 90000
- takeScreenshot: 17-weekly-review-live

# --- Flip the Dawn switch back to midnight via the UI ---
- tapOn: "Today, tab.*"
- waitForAnimationToEnd
- tapOn: "Open profile and settings.*"
- extendedWaitUntil:
    visible: "My Personas.*"
    timeout: 10000
- scrollUntilVisible:
    element:
      text: "Dawn Theme.*"
    direction: DOWN
    timeout: 30000
    centerElement: true
- waitForAnimationToEnd
- tapOn: "Toggle Dawn Theme"
- waitForAnimationToEnd
- takeScreenshot: 19-profile-back-to-midnight
- tapOn: "Close profile.*"
- takeScreenshot: 20-today-midnight-restored
