appId: com.resolutioncompanion.app
---
# Requires the standard seeded simulator state used by qa/maestro-regression.
# Verifies the grounded opening streams locally, then exercises one real
# production Coach response and the weekly-to-monthly session boundary.

- launchApp
- repeat:
    times: 3
    commands:
      - tapOn:
          text: "Dismiss milestone celebration.*"
          optional: true
      - waitForAnimationToEnd
- tapOn: "Coach, tab.*"
- scrollUntilVisible:
    element:
      text: ".*3-minute weekly review.*"
    direction: DOWN
    timeout: 20000
    centerElement: true
    visibilityPercentage: 40
- tapOn:
    text: ".*3-minute weekly review.*"
    waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible: "Weekly Review"
    timeout: 10000
- extendedWaitUntil:
    visible: "AI coach: .+"
    timeout: 2000
- assertVisible: "Coach is typing.*"
- takeScreenshot: coach-weekly-opening-streaming
- extendedWaitUntil:
    visible: "Message to your AI coach.*"
    timeout: 10000
- assertNotVisible: ".*[Ww]eek 29.*"
- tapOn: "Message to your AI coach.*"
- inputText: "My win was completing my weekend run even though I felt tired."
- tapOn: "Send message.*"
- extendedWaitUntil:
    # The grounded opening always begins "Looking back". A second Coach
    # bubble with any other opening proves the live response has started,
    # without requiring the model to repeat one exact word verbatim.
    visible: "AI coach: (?!Looking back).*"
    timeout: 25000
- takeScreenshot: coach-grounded-live-response
- extendedWaitUntil:
    # The model's completed coaching turn ends with a follow-up question.
    # Waiting for it distinguishes a complete stream from the first chunk.
    visible: "AI coach: (?!Looking back).*\\?.*"
    timeout: 90000
- tapOn: "Message to your AI coach.*"
- inputText: "I made the run easier by putting my shoes beside the door."
- assertVisible: ".*shoes beside the door.*"
- takeScreenshot: coach-grounded-complete-response

# Close the weekly session, then verify the next session cannot inherit it.
- tapOn: "End session.*"
- tapOn:
    text: "Discard"
    optional: true
- scrollUntilVisible:
    element:
      text: "Your coach is ready for your .* check-in.*"
    direction: DOWN
    timeout: 20000
    centerElement: true
    visibilityPercentage: 40
- tapOn:
    text: "Your coach is ready for your .* check-in.*"
    waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible: "Monthly Check-in"
    timeout: 10000
- extendedWaitUntil:
    visible: "AI coach: .+"
    timeout: 2000
- assertVisible: "Coach is typing.*"
- takeScreenshot: coach-monthly-opening-streaming
- extendedWaitUntil:
    # The input becomes available only after the grounded opening completes.
    visible: "Message to your AI coach.*"
    timeout: 10000
- assertNotVisible: ".*[Ww]eek 29.*"
- takeScreenshot: coach-monthly-session-isolated
