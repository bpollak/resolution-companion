# Fly.io config for the Resolution Companion API server.
#
# Deploy:   fly launch --copy-config     (first time)
#           fly deploy                   (subsequent)
# Secrets:  fly secrets set KEY=value    (NEVER put secrets in this file)
# Logs:     fly logs
#
# The app's public URL is https://resolutioncompanion.com once DNS + certs
# are wired up (see DEPLOY.md).

app = "resolution-companion"
primary_region = "iad"                # Change to your nearest region

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5000"
  # Locked down in the Express CORS middleware to these origins only.
  ALLOWED_ORIGINS = "https://resolutioncompanion.com,https://www.resolutioncompanion.com"
  ANDROID_PACKAGE_NAME = "com.resolutioncompanion.app"
  # Sandbox mode OFF in production (flip to "true" for a staging app).
  APPLE_SANDBOX = "false"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep at least one machine warm so Apple webhook ACKs never eat a cold
  # start. Scale up by changing this + running `fly scale count N`.
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
