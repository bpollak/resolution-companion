name: Checks

# Railway auto-deploys main via its GitHub integration; this workflow just
# protects main with a typecheck + lint gate on PRs. No deploy step here.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    name: Typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run check:types
      - run: npm run lint
