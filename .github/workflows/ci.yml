name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run check:types
      - name: Lint
        run: npm run lint
      - name: Format
        run: npm run check:format
      - name: Server production build
        run: npm run server:build
