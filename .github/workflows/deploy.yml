name: Deploy API to Fly.io

# Deploys the Express API server to Fly.io on every push to main.
# Requires one repo secret: FLY_API_TOKEN (generate via `fly tokens create deploy -x 999999h`).

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "shared/**"
      - "Dockerfile"
      - "fly.toml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  # Cancel in-flight deploys when a newer commit lands.
  group: deploy-prod
  cancel-in-progress: false

jobs:
  verify:
    name: Typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run check:types
      - run: npm run lint

  deploy:
    name: Deploy to Fly
    needs: verify
    runs-on: ubuntu-latest
    concurrency: deploy-prod-runner
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
